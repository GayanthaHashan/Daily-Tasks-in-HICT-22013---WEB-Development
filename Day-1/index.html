<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Web Development Day-1 Task</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ============ NAV BAR (FLEX) ============ -->
  <nav class="navbar">
    <div class="nav-brand">Web development Day-1 task</div>
    <ul class="nav-links">
      <li><a href="#flexbox">Flex box</a></li>
      <li><a href="#grids">Grids</a></li>
      <li><a href="#thankyou">Thank you</a></li>
    </ul>
  </nav>

  <main>

    <!-- ============ PAGE 1 : FLEX BOX PAGE (FLEX ONLY) ============ -->
    <section id="flexbox" class="page flex-page">

      <div class="hero-box">
        <h1>This is Flex Box Samples</h1>
      </div>

      <div class="small-box-row">
        <div class="small-box"></div>
        <div class="small-box"></div>
        <div class="small-box"></div>
        <div class="small-box"></div>
      </div>

    </section>

    <!-- ============ PAGE 2 : GRID BOX PAGE (GRID ONLY) ============ -->
    <section id="grids" class="page grid-page">

      <h2 class="grid-title">This is Grid box Samples</h2>

      <div class="grid-container">
        <div class="g-box sq"><span class="animal">🐶</span></div>
        <div class="g-box wide"><span class="animal">🦊</span></div>
        <div class="g-box wide"><span class="animal">🐼</span></div>
        <div class="g-box sq"><span class="animal">🐰</span></div>

        <div class="g-box wide"><span class="animal">🐻</span></div>
        <div class="g-box sq"><span class="animal">🐱</span></div>
        <div class="g-box wide"><span class="animal">🐨</span></div>
        <div class="g-box sq"><span class="animal">🦁</span></div>

        <div class="g-box sq"><span class="animal">🐯</span></div>
        <div class="g-box wide"><span class="animal">🐷</span></div>
        <div class="g-box sq"><span class="animal">🐮</span></div>
        <div class="g-box wide"><span class="animal">🐸</span></div>
      </div>

    </section>

    <!-- ============ PAGE 3 : THANK YOU PAGE (FLEX) ============ -->
    <section id="thankyou" class="page thank-page">
      <div class="hero-box thank-hero">
        <h1>Thank you for Reviewing</h1>
      </div>
    </section>

  </main>

  <!-- ============ FOOTER (GRID) ============ -->
  <footer class="footer">
    <div class="footer-content">Web development Day-1 task</div>
  </footer>

</body>
</html>
